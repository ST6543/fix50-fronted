<!-- RESULTATEN -->
<div id="onderhoud-resultaten" class="home-grid"></div>

<!-- MAIL SIMULATIE -->
<div id="mail-simulatie" class="diagnose-container hidden">

    <p>Fix50 heeft een onderhoudsherinnering naar jouw e-mail gestuurd.</p>
    <p style="color:#ff6600;">(Simulatie voor je docent — geen echte mail)</p>
