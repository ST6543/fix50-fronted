<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Registreren – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.png" alt="Fix50 Logo">
</header>

<div class="form-container">
    <h2>Account aanmaken</h2>

    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">

    <button onclick="register()">Registreren</button>

    <p>Heb je al een account? <a href="login.html">Inloggen</a></p>
    <p id="message"></p>
</div>

<script>
const API_BASE = "https://fix50.onrender.com"; // JUISTE BACKEND

async function register() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    msg.innerText = "";

    if (!email || !password) {
        msg.innerText = "Vul alle velden in.";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.error || "Er ging iets mis.";
            return;
        }

        alert("Account aangemaakt!");
        window.location.href = "login.html";

    } catch (err) {
        msg.innerText = "Server niet bereikbaar.";
    }
}
</script>

</body>
</html>
