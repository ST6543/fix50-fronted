<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Registreren – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-bg">

<header class="topbar">
    <span class="logo-text">Fix50</span>
</header>

<section class="hero">
    <h1>Account aanmaken</h1>
    <p>Maak een nieuw Fix50 account.</p>
</section>

<div class="form-card">
    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">
    <input id="password2" type="password" placeholder="Herhaal wachtwoord">

    <button onclick="register()">Registreren</button>

    <p id="reg-msg"></p>

    <p style="text-align:center; margin-top:10px;">
        Al een account? <a href="login.html" style="color:#ff6600;">Inloggen</a>
    </p>
</div>

<script>
async function register() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const password2 = document.getElementById("password2").value.trim();
    const msg = document.getElementById("reg-msg");

    msg.textContent = "";
    msg.style.color = "red";

    if (!email || !password || !password2) {
        msg.textContent = "Vul alle velden in.";
        return;
    }

    if (password !== password2) {
        msg.textContent = "Wachtwoorden komen niet overeen.";
        return;
    }

    try {
        const res = await fetch("https://fix50.onrender.com/api/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Registratie mislukt");

        msg.style.color = "green";
        msg.textContent = "Account aangemaakt! Je wordt ingelogd...";

        // Automatisch inloggen
        localStorage.setItem("token", data.token);

        setTimeout(() => location.href = "scooter.html", 500);

    } catch (err) {
        msg.textContent = err.message;
    }
}
</script>

</body>
</html>
