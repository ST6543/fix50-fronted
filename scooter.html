<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn scooters</title>
</head>
<body>

  <h1>Mijn scooters</h1>

  <div>
    <input id="naam" placeholder="Naam scooter">
    <input id="kenteken" placeholder="Kenteken">
    <input id="km" type="number" placeholder="Kilometerstand">
    <button type="button" onclick="saveScooter()">Opslaan</button>
    <p id="message"></p>
  </div>

  <h2>Overzicht</h2>
  <div id="scooter-list"></div>

  <div id="edit-popup" style="display:none;">
    <h3>Scooter bewerken</h3>
    <input id="edit-id" type="hidden">
    <input id="edit-naam" placeholder="Naam">
    <input id="edit-kenteken" placeholder="Kenteken">
    <input id="edit-km" type="number" placeholder="Kilometerstand">
    <button type="button" onclick="updateScooter()">Opslaan</button>
    <button type="button" onclick="document.getElementById('edit-popup').style.display='none'">Annuleren</button>
  </div>

  <!-- BELANGRIJK: script.js MOET HIER STAAN -->
  <script src="script.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadScooters();
    });
  </script>

</body>
</html>
