<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Scooters - Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
  }
</script>

<header>
    <h1>Fix50</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="scooter.html">Scooters</a>
        <a href="onderhoud.html">Onderhoud</a>
        <a href="diagnose.html">Diagnose</a>
        <a href="login.html" onclick="localStorage.removeItem('token')">Logout</a>
    </nav>
</header>

<section class="content">

    <h2 class="page-title">Scooter toevoegen</h2>

    <div class="form-container">
        <input id="naam" placeholder="Scooter naam">
        <input id="kenteken" placeholder="Kenteken">
        <input id="km" placeholder="Kilometers" type="number">
        <button onclick="saveScooter()">Opslaan</button>
        <p id="message"></p>
    </div>

    <h2 class="page-title">Jouw scooters</h2>

    <div id="scooter-list"></div>

</section>

<!-- BEWERKEN POPUP -->
<div id="edit-popup" class="popup" style="display:none;">
    <div class="popup-content">
        <h3>Scooter bewerken</h3>

        <input id="edit-naam" placeholder="Nieuwe naam">
        <input id="edit-kenteken" placeholder="Nieuw kenteken">
        <input id="edit-km" placeholder="Nieuwe kilometers" type="number">

        <input type="hidden" id="edit-id">

        <button onclick="updateScooter()">Opslaan</button>
        <button class="danger" onclick="document.getElementById('edit-popup').style.display='none'">Annuleren</button>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Automatisch scooters laden bij openen van de pagina
    loadScooters();
</script>

</body>
</html>
