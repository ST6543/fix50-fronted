<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Scooterbeheer – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-bg">

<header class="topbar">
    <span class="logo-text">Fix50</span>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="scooter.html">Scooters</a>
        <a href="onderhoud.html">Onderhoud</a>
        <a href="diagnose.html">Diagnose</a>
        <a href="login.html" onclick="localStorage.removeItem('token')">Logout</a>
    </nav>
</header>

<section class="hero">
    <h1>Scooterbeheer</h1>
    <p>Beheer al je scooters overzichtelijk op één plek.</p>
</section>

<div class="form-card">
    <h3 style="color:#ff6600; text-align:center;">Nieuwe scooter toevoegen</h3>

    <input id="naam" placeholder="Naam scooter">
    <input id="kenteken" placeholder="Kenteken">
    <input id="km" type="number" placeholder="Kilometerstand">
    <select id="type">
        <option value="">Kies type</option>
        <option value="2T">2-Takt</option>
        <option value="4T">4-Takt</option>
    </select>

    <button onclick="saveScooter()">Opslaan</button>
    <p id="message"></p>
</div>

<div id="scooter-list" class="scooter-grid"></div>

<!-- Popup -->
<div id="edit-popup" class="popup hidden">
    <div class="popup-content">
        <h3 style="color:#ff6600;">Scooter bewerken</h3>

        <input id="edit-id" type="hidden">
        <input id="edit-naam" placeholder="Naam">
        <input id="edit-kenteken" placeholder="Kenteken">
        <input id="edit-km" type="number" placeholder="Kilometerstand">
        <select id="edit-type">
            <option value="2T">2-Takt</option>
            <option value="4T">4-Takt</option>
        </select>

        <button onclick="updateScooter()">Opslaan</button>
        <button class="danger" onclick="closePopup()">Annuleren</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
