<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Scooters - Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN CHECK -->
<script>
  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
  }
</script>

<!-- NIEUWE STRAKKE HEADER -->
<header class="topbar">
    <a href="index.html" class="logo-container">
        <img src="logo.png" alt="Fix50 logo" class="logo">
        <span class="logo-text">Fix50</span>
    </a>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="scooter.html">Scooters</a>
        <a href="onderhoud.html">Onderhoud</a>
        <a href="diagnose.html">Diagnose</a>
        <a href="login.html" onclick="localStorage.removeItem('token')">Logout</a>
    </nav>
</header>

<section class="content">

    <h2 class="page-title">Scooter toevoegen</h2>

    <div class="form-container">
        <input id="naam" placeholder="Scooter naam">
        <input id="kenteken" placeholder="Kenteken">
        <input id="km" placeholder="Kilometers" type="number">
        <button onclick="saveScooter()">Opslaan</button>
        <p id="message"></p>
    </div>

    <h2 class="page-title">Jouw scooters</h2>

    <div id="scooter-list"></div>

</section>

    <div class="popup-content">
