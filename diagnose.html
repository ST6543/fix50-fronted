<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Diagnose - Fix50</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="diagnose.css">
</head>

<body>

<header class="topbar">
    <a href="index.html" class="logo-container">
        <img src="logo.png" alt="Fix50 logo" class="logo">
        <span class="logo-text">Fix50</span>
    </a>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="scooter.html">Scooters</a>
        <a href="onderhoud.html">Onderhoud</a>
        <a href="diagnose.html" class="active">Diagnose</a>
        <a href="login.html" onclick="localStorage.removeItem('token')">Logout</a>
    </nav>
</header>

<section class="symptom-cards">
    <h1 class="diag-title">Kies je probleem</h1>

    <div class="symptom-grid">

        <!-- AUTOMATISCH GEGENEREERDE SYMPTOMEN -->
        <script>
            const symptoms = Object.keys(diagnoseData);
            document.write(
                symptoms.map(s => `
                    <div class="symptom-card" onclick="startDiagnosis('${s}')">
                        <h3>${s}</h3>
                        <p>${diagnoseData[s].oorzaken[0]}</p>
                    </div>
                `).join("")
            );
        </script>

    </div>
</section>

<div id="wizard" class="hidden"></div>

<script src="diagnoseData.js"></script>
<script src="diagnoseFlow.js"></script>

</body>
</html>
