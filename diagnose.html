<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Diagnose – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-bg">

<header class="topbar">
    <span class="logo-text">Fix50</span>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="scooter.html">Scooters</a>
        <a href="onderhoud.html">Onderhoud</a>
        <a class="active" href="diagnose.html">Diagnose</a>
        <a href="login.html" onclick="localStorage.removeItem('token')">Logout</a>
    </nav>
</header>

<section class="hero">
    <h1>Diagnose</h1>
    <p>Kies een symptoom om te beginnen.</p>
</section>

<div class="home-grid">

    <div class="home-card" onclick="startWizard('start-niet')">
        <h3>Start niet</h3>
        <p>Motor draait niet of slaat niet aan.</p>
    </div>

    <div class="home-card" onclick="startWizard('valt-uit')">
        <h3>Valt uit</h3>
        <p>Scooter stopt tijdens het rijden.</p>
    </div>

    <div class="home-card" onclick="startWizard('slecht-trekken')">
        <h3>Slecht optrekken</h3>
        <p>Vermogen of snelheid ontbreekt.</p>
    </div>

    <div class="home-card" onclick="startWizard('raar-geluid')">
        <h3>Raar geluid</h3>
        <p>Tikken, ratelen of schrapen.</p>
    </div>

</div>

<script>
function startWizard(symptoom) {
    alert("Diagnose start voor: " + symptoom);
}
</script>

</body>
</html>
