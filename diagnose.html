<body>

<header class="topbar">

<section class="symptom-cards">
    <h1 class="diag-title">Kies je probleem</h1>

    <div class="symptom-grid" id="symptomGrid"></div>
</section>

<!-- Wizard -->
<div id="wizard" class="hidden"></div>

<script src="diagnoseData.js"></script>
<script src="diagnoseFlow.js"></script>

<script>
// AUTOMATISCH ALLE SYMPTOMEN LADEN
const grid = document.getElementById("symptomGrid");
const symptoms = Object.keys(diagnoseData);

grid.innerHTML = symptoms.map(sym => `
    <div class="symptom-card" onclick="startDiagnosis('${sym}')">
        <h3>${sym}</h3>
        <p>${diagnoseData[sym].oorzaken[0]}</p>
    </div>
`).join("");
</script>
