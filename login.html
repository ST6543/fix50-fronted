<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Inloggen - Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NIEUWE STRAKKE HEADER -->
<header class="topbar">
    <a href="index.html" class="logo-container">
        <img src="logo.png" alt="Fix50 logo" class="logo">
        <span class="logo-text">Fix50</span>
    </a>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Registreren</a>
    </nav>
</header>

<section class="form-container">
    <h2>Inloggen</h2>

    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">

    <button onclick="login()">Inloggen</button>

    <p id="message"></p>
</section>

<script>
const API_BASE = "https://fix50-backend-login-en-registratie.onrender.com";

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        document.getElementById("message").innerText = "Vul alle velden in.";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.token) {
            localStorage.setItem("token", data.token);
            window.location.href = "scooter.html";
        } else {
            document.getElementById("message").innerText = data.error || "Onjuiste gegevens.";
        }
    } catch (err) {
        document.getElementById("message").innerText = "Server niet bereikbaar.";
    }
}
</script>

</body>
</html>
