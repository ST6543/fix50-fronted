<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Login – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-bg">

<header class="topbar">
    <span class="logo-text">Fix50</span>
</header>

<section class="hero">
    <h1>Inloggen</h1>
    <p>Log in om je scooters te beheren.</p>
</section>

<div class="form-card">
    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">

    <button onclick="login()">Inloggen</button>

    <p id="login-msg"></p>

    <p style="text-align:center; margin-top:10px;">
        Nog geen account? <a href="register.html" style="color:#ff6600;">Registreren</a>
    </p>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("login-msg");

    msg.textContent = "";
    msg.style.color = "red";

    if (!email || !password) {
        msg.textContent = "Vul alle velden in.";
        return;
    }

    try {
        const res = await fetch("https://fix50.onrender.com/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Login mislukt");

        localStorage.setItem("token", data.token);

        msg.style.color = "green";
        msg.textContent = "Succesvol ingelogd!";

        setTimeout(() => location.href = "scooter.html", 500);

    } catch (err) {
        msg.textContent = err.message;
    }
}
</script>

</body>
</html>
